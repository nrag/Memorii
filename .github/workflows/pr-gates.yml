name: PR Gates

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: memorii/pyproject.toml

      - name: Install package + test deps
        working-directory: memorii
        run: pip install -e '.[dev]'

      - name: Run unit tests
        working-directory: memorii
        run: pytest tests/unit
