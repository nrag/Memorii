prompt_id: judges/belief_direction
version: v1
task: Evaluate belief_direction for one candidate decision.
description: Single-dimension Wave 1 judge contract for belief_direction.
input_schema:
  type: object
  required: [rubric_json, input_payload]
  additionalProperties: false
  properties:
    rubric_json: {type: object}
    input_payload: {type: object}
output_schema:
  type: object
  additionalProperties: false
  required: [passed, score, rationale, failure_mode, needs_human_review]
  properties:
    passed: {type: boolean}
    score: {type: number, minimum: 0.0, maximum: 1.0}
    rationale: {type: string}
    failure_mode: {type: [string, 'null']}
    needs_human_review: {type: boolean}
system_template: "Evaluate exactly one dimension: belief_direction. Do not judge other dimensions. Use the provided rubric only. Return strict JSON matching schema."
user_template: "Rubric: {rubric_json}\nCase payload: {input_payload}\nReturn strict JSON only."
model_defaults: {provider: openai, model: null, temperature: 0.0, max_tokens: 1000, timeout_seconds: null}
redaction:
  redact_input_fields: [api_key, token, password, secret, authorization, cookie]
  redact_output_fields: [api_key, token, password, secret, authorization, cookie]
  redact_metadata_fields: [api_key, token, password, secret, authorization, cookie]
allowed_failure_modes: [should_increase, should_decrease, should_not_increase, should_remain_uncertain, ambiguous_direction]
tags: [judge, wave1, belief_direction]
